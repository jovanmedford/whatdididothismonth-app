name: wdidtm
services:
  db:
    image: postgres:15.8
    env_file: .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 2s
      timeout: 3s
      retries: 10
  test-db:
    image: postgres:15.8
    env_file: .env.test
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 2s
      timeout: 3s
      retries: 10
